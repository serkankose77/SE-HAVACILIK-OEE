services:
  influxdb:
    image: influxdb:2.7
    container_name: oee-influxdb
    restart: unless-stopped
    ports:
      - "${INFLUX_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUX_RETENTION:-0}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - oee-net

  collector:
    build:
      context: ./collector
    image: se-havacilik-oee/collector:latest
    container_name: oee-collector
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      POLL_INTERVAL: ${POLL_INTERVAL:-2}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MACHINES_FILE: /app/machines.json
    volumes:
      - ./machines.json:/app/machines.json:ro
    networks:
      - oee-net

volumes:
  influxdb-data:
  influxdb-config:

networks:
  oee-net:
    driver: bridge
